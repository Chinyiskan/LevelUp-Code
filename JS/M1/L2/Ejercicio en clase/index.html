<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Generador de Perfil Gamer</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            color: white;
            font-size: 1.5rem;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            line-height: 1.6;
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
        }

        .main-container {
            max-width: 600px;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .form-label {
            font-weight: 600;
            color: #2c3e50;
        }

        .form-control, .form-select {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 15px;
            font-weight: 700;
            font-size: 1.1rem;
            border-radius: 12px;
            color: white;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        .result-card {
            margin-top: 30px;
            border-radius: 15px;
            border: 3px solid #e0e0e0;
            transition: all 0.4s ease;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-card.empty {
            background: #f8f9fa;
            color: #adb5bd;
            font-style: italic;
        }

        /* Estilos según el rango */
        .result-card.bronce {
            background: linear-gradient(135deg, #CD7F32 0%, #8B5A2B 100%);
            border-color: #8B5A2B;
            color: white;
        }

        .result-card.plata {
            background: linear-gradient(135deg, #C0C0C0 0%, #808080 100%);
            border-color: #808080;
            color: white;
        }

        .result-card.oro {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border-color: #FF8C00;
            color: #2c3e50;
        }

        .profile-content {
            text-align: center;
            padding: 20px;
        }

        .profile-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .profile-message {
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .rank-emoji {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        /* Animación de entrada */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: fadeIn 0.5s ease;
        }

        /* Responsive */
        @media (max-width: 576px) {
            h1 {
                font-size: 1.1rem;
            }

            .main-container {
                padding: 25px;
            }

            .profile-title {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Título principal -->
        <h1 class="text-center mb-2">🎮 Generador de Perfil Gamer</h1>
        <p class="subtitle text-center">Crea tu perfil épico en segundos</p>

        <!-- Contenedor principal -->
        <div class="main-container">
            
            <!-- Formulario -->
            <form id="gamerForm">
                
                <!-- Campo: Nombre -->
                <div class="mb-3">
                    <label for="nombre" class="form-label">⚔️ Nombre del Guerrero</label>
                    <input 
                        type="text" 
                        class="form-control" 
                        id="nombre" 
                        placeholder="Ej: DragonSlayer">
                </div>

                <!-- Campo: Rango -->
                <div class="mb-3">
                    <label for="rango" class="form-label">🏆 Rango</label>
                    <select class="form-select" id="rango">
                        <option value="">Selecciona tu rango</option>
                        <option value="bronce">🥉 Bronce</option>
                        <option value="plata">🥈 Plata</option>
                        <option value="oro">🥇 Oro</option>
                    </select>
                </div>

                <!-- Campo: Clan -->
                <div class="mb-3">
                    <label for="clan" class="form-label">🛡️ Nombre del Clan</label>
                    <input 
                        type="text" 
                        class="form-control" 
                        id="clan" 
                        placeholder="Ej: Dragones del Norte">
                </div>

                <!-- Botón -->
                <button type="button" id="btn-generar" class="btn btn-generate w-100">
                    ⚡ Generar Perfil
                </button>

            </form>

            <!-- Card de resultado -->
            <div class="card result-card empty" id="resultado">
                <div class="card-body">
                    <p class="mb-0">Tu perfil aparecerá aquí...</p>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Nuestro JavaScript -->
    <script src="script.js"></script>
</body>
</html>
