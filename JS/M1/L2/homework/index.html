<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>😂 Meme Generator</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .page-title {
            color: white;
            text-align: center;
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
        }

        .page-subtitle {
            color: rgba(255,255,255,0.9);
            text-align: center;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .main-container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Contenedor de la imagen del meme */
        .meme-container {
            position: relative;
            max-width: 600px;
            margin: 0 auto 30px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .meme-image-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 10px;
        }

        /* La imagen del meme */
        .meme-image {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Textos superpuestos sobre la imagen */
        .meme-text {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            
            /* Estilo clásico de meme */
            font-family: 'Anton', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1.1;
            
            /* Texto con borde negro (efecto clásico de meme) */
            text-shadow: 
                -2px -2px 0 #000,
                2px -2px 0 #000,
                -2px 2px 0 #000,
                2px 2px 0 #000,
                0 0 5px #000;
            
            /* Para que el texto se vea sobre la imagen */
            z-index: 10;
            
            /* Evitar selección del texto placeholder */
            pointer-events: none;
        }

        /* Texto superior */
        .meme-text.top {
            top: 20px;
        }

        /* Texto inferior */
        .meme-text.bottom {
            bottom: 20px;
        }

        /* Panel de controles */
        .controls-panel {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 600px;
            margin: 0 auto;
        }

        .controls-title {
            color: #2c3e50;
            font-weight: 700;
            font-size: 1.3rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-label {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .input-hint {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-top: 5px;
        }

        /* Responsive - texto más pequeño en móviles */
        @media (max-width: 768px) {
            .page-title {
                font-size: 2rem;
            }

            .meme-text {
                font-size: 2rem;
            }

            .controls-panel {
                padding: 20px;
            }
        }

        @media (max-width: 576px) {
            .meme-text {
                font-size: 1.5rem;
            }

            .meme-container {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        
        <!-- Título de la página -->
        <h1 class="page-title">😂 Meme Generator</h1>
        <p class="page-subtitle">Crea memes épicos en tiempo real</p>

        <!-- Contenedor del meme -->
        <div class="meme-container">
            <div class="meme-image-wrapper">
                <!-- Imagen del meme -->
                <img src="meme1.jpg" alt="Meme" class="meme-image">
                
                <!-- Texto superior (superpuesto) -->
                <div class="meme-text top" id="topText">
                    <!-- El texto aparecerá aquí en tiempo real -->
                </div>
                
                <!-- Texto inferior (superpuesto) -->
                <div class="meme-text bottom" id="bottomText">
                    <!-- El texto aparecerá aquí en tiempo real -->
                </div>
            </div>
        </div>

        <!-- Panel de controles -->
        <div class="controls-panel">
            <h2 class="controls-title">✏️ Edita tu Meme</h2>
            
            <!-- Input para texto superior -->
            <div class="mb-4">
                <label for="inputTop" class="form-label">📝 Texto Superior</label>
                <input 
                    type="text" 
                    class="form-control" 
                    id="inputTop" 
                    placeholder="Escribe el texto de arriba..."
                    maxlength="50">
                <div class="input-hint">
                    💡 El texto aparecerá mientras escribes
                </div>
            </div>

            <!-- Input para texto inferior -->
            <div class="mb-3">
                <label for="inputBottom" class="form-label">📝 Texto Inferior</label>
                <input 
                    type="text" 
                    class="form-control" 
                    id="inputBottom" 
                    placeholder="Escribe el texto de abajo..."
                    maxlength="50">
                <div class="input-hint">
                    ⚡ Sin botones, sin esperas, solo magia JavaScript
                </div>
            </div>
        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Nuestro JavaScript -->
    <script src="script.js"></script>
</body>
</html>
